# bunfig.toml
# https://bun.com/docs/runtime/bunfig

# Log levels: "debug" | "warn" | "error"
logLevel = "warn"

telemetry = false

[define]
# Replace any usage of "process.env.bagel" with the string `lox`.
# The values are parsed as JSON, except single-quoted strings are supported and `'undefined'` becomes `undefined` in JS.
# This will probably change in a future release to be just regular TOML instead. It is a holdover from the CLI argument parsing.
#"process.env.bagel" = "'lox'"

[loader]
# when a .bagel file is imported, treat it like a tsx file
#".bagel" = "tsx"

[test]
preload = ["./happydom.ts"]
#coverage = true # always output coverage
coverageThreshold = 0.7
#coverageThreshold = { lines = 0.9, functions = 0.9, statements = 0.9 }
#coverageSkipTestFiles = false
#coveragePathIgnorePatterns = "**/*.spec.ts"
coverageReporter  = ["text", "lcov"]
coverageDir       = "coverage"
# Force sequential test execution to prevent state pollution
#bail = 0
#concurrency = 1
# Reset module state between tests
#smol = true

[test.reporter]
junit = "tests/junit.xml"

[install.scopes]
jsr = "https://npm.jsr.io"

[install.security]
scanner = "bun-osv-scanner"

[run]
# equivalent to `bun --bun` for all `bun run` commands
bun = true
# suppress reporting the command being run
silent = false
