#-------------------------------------------------------------------------------#
#               Qodana analysis is configured by qodana.yaml file               #
#             https://www.jetbrains.com/help/qodana/qodana-yaml.html            #
#-------------------------------------------------------------------------------#
version: "1.0"
#Specify inspection profile for code analysis
profile:
  name: qodana.starter
#Enable inspections
#include:
#  - name: <SomeEnabledInspectionId>
#Disable inspections
#exclude:
#  - name: <SomeDisabledInspectionId>
#    paths:
#      - <path/where/not/run/inspection>
#Execute shell command before Qodana execution (Applied in CI/CD pipeline)
#bootstrap: sh ./prepare-qodana.sh
#Install IDE plugins before Qodana execution (Applied in CI/CD pipeline)
#plugins:
#  - id: <plugin.id> #(plugin id can be found at https://plugins.jetbrains.com)
# Quality gate. Will fail the CI/CD pipeline if any condition is not met
# severityThresholds - configures maximum thresholds for different problem severities
# testCoverageThresholds - configures minimum code coverage on a whole project and newly added code
# Code Coverage is available in Ultimate and Ultimate Plus plans
#failureConditions:
#  severityThresholds:
#    any: 15
#    critical: 5
#  testCoverageThresholds:
#    fresh: 70
#    total: 50
#Specify Qodana linter for analysis (Applied in CI/CD pipeline)
linter: jetbrains/qodana-js:2025.2
include:
  - name: MagicNumberJS
  - name: BlockStatementJS
  - name: CssMissingComma
  - name: CssNoGenericFontName
  - name: CssNonIntegerLengthInPixels
  - name: EjsUnresolvedInclude
  - name: DuplicatedCode
  - name: Annotator
  - name: EmptyDirectory
  - name: InconsistentLineSeparators
  - name: IncorrectFormatting
  - name: InjectedReferences
  - name: ReassignedToPlainText
  - name: RedundantSuppression
  - name: TodoComment
  - name: CyclicJobDependency
  - name: MandatoryParamsAbsent
  - name: GithubFunctionSignatureValidation
  - name: UndefinedAction
  - name: IllegalJobDependency
  - name: UndefinedParamsPresent
  - name: com.intellij.reactbuddy.ArrayToJSXMapInspection
  - name: com.intellij.reactbuddy.PaletteExtLocalInspection
  - name: com.intellij.reactbuddy.EmptyAttributeInspection
  - name: com.intellij.reactbuddy.ExhaustiveDepsInspection
  - name: com.intellij.reactbuddy.EmptyRefInspection
  - name: CyclomaticComplexityInspection
  - name: ShellCheck
  - name: PgSelectFromProcedureInspection
  - name: MarkdownOutdatedTableOfContents
  - name: MarkdownIncorrectlyNumberedListItem
  - name: MarkdownIncorrectTableFormatting
  - name: MarkdownUnresolvedFileReference
  - name: MarkdownUnresolvedHeaderReference
  - name: MarkdownUnresolvedHeaderReference
  - name: MarkdownUnresolvedLinkLabel
