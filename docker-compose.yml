# Docker Compose for VetMed Tracker
# Production-ready configuration with security hardening

version: '3.8'

services:
  # Main application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: vetmed-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - VETMED_ENCRYPTION_KEY=${VETMED_ENCRYPTION_KEY}
      - NEXT_PUBLIC_STACK_PROJECT_ID=${NEXT_PUBLIC_STACK_PROJECT_ID}
      - STACK_SECRET_SERVER_KEY=${STACK_SECRET_SERVER_KEY}
    depends_on:
      - postgres
      - redis
    networks:
      - vetmed-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    volumes:
      - app-cache:/app/.next/cache:rw

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: vetmed-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-vetmed}
      - POSTGRES_USER=${POSTGRES_USER:-vetmed}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - postgres-backup:/backup
      - ./scripts/postgres:/docker-entrypoint-initdb.d:ro
    networks:
      - vetmed-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vetmed} -d ${POSTGRES_DB:-vetmed}"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    command: >
      postgres
      -c log_statement=all
      -c log_destination=stderr
      -c log_min_duration_statement=1000
      -c shared_preload_libraries=pg_stat_statements
      -c track_activity_query_size=1048576

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: vetmed-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./scripts/redis/redis.conf:/etc/redis/redis.conf:ro
    networks:
      - vetmed-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    command: redis-server /etc/redis/redis.conf

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: vetmed-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./scripts/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./scripts/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certificates:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      - app
    networks:
      - vetmed-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: vetmed-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./scripts/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - vetmed-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'

  # Monitoring - Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: vetmed-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SECURITY_DISABLE_GRAVATAR=true
    volumes:
      - grafana-data:/var/lib/grafana
      - ./scripts/monitoring/grafana:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - vetmed-network

  # Log Aggregation - Loki
  loki:
    image: grafana/loki:latest
    container_name: vetmed-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./scripts/monitoring/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/tmp/loki
    networks:
      - vetmed-network
    command: -config.file=/etc/loki/local-config.yaml

  # Database Backup Service
  backup:
    image: postgres:15-alpine
    container_name: vetmed-backup
    restart: "no"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-vetmed}
      - POSTGRES_USER=${POSTGRES_USER:-vetmed}
      - PGPASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-backup:/backup
      - ./scripts/backup:/scripts:ro
    networks:
      - vetmed-network
    depends_on:
      - postgres
    entrypoint: ["/scripts/backup.sh"]

# Named volumes for data persistence
volumes:
  postgres-data:
    driver: local
  postgres-backup:
    driver: local
  redis-data:
    driver: local
  app-cache:
    driver: local
  nginx-cache:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local

# Isolated network for services
networks:
  vetmed-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16